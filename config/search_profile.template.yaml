# Copy to config/search_profile.local.yaml and edit (gitignored).
# Or start from a catalog profile: cp config/search_profiles/single-us-metro-2026.yaml config/search_profile.local.yaml
# See docs/SEARCH_PROFILES.md and config/profile_catalog.yaml for the full family.
# Validate: python3 -c "from lib.search_profile import load_profile; load_profile('config/search_profile.local.yaml')"

owner: your-name

# fully_remote       — US employee remote only; no hybrid/onsite
# hybrid_home_metro  — remote US OR hybrid/onsite in home_metro.place_names only
# any_us_remote      — broadest; may include hybrid non-home-metro (check your L-0 geo rules)
remote_preference: hybrid_home_metro

home_metro:
  name: your metro name
  zip_anchor: "00000"
  place_names:
    - Your City
    - Nearby suburb
    # Add every city/neighborhood you'd commute to for hybrid days

comp:
  min_ceiling_usd: 130000
  # tier_floors:        # optional manual offer gates after triage
  #   "5": 145000
  #   "7": 150000

ils:
  cold_floor: 45
  referral_warm_delta: -10
  referral_strong_delta: -20

tracks:
  enable: [A, B, C]
  # sdk-review F1: track legend lives in OPERATIONS.md after JOBSPY_INVENTORY removal
  # Optional boards: G, R, GH, L, AS — see docs/OPERATIONS.md (scraper tracks)

referrals:
  status_file: config/referral_status.local.txt
  # Format: company_substring,status  (cold | warm | strong)

output:
  results_dir: ./data/jobspy_results
