# Couple, two earners, no dependents, medium COL (corpofit persona). Edit home_metro for your market.
fit_calibration_profile: couple-no-deps-medium-col-2026
owner: couple-no-deps-medium-col-2026

remote_preference: hybrid_home_metro

home_metro:
  name: Atlanta core
  zip_anchor: "30317"
  place_names:
    - Atlanta
    - Decatur
    - Sandy Springs
    - Marietta
    - Alpharetta
    - Buckhead
    - Midtown Atlanta

comp:
  # tier_floors from corpofit comp_floor_usd; min_ceiling_usd = tier-5 floor − $15k (scraper comp_ok).
  min_ceiling_usd: 110000
  tier_floors:
    "5": 125000
    "7": 145000

ils:
  cold_floor: 45
  referral_warm_delta: -10
  referral_strong_delta: -20

tracks:
  enable: [A, B, C]

referrals:
  status_file: config/referral_status.template.txt

output:
  results_dir: ./data/jobspy_results
